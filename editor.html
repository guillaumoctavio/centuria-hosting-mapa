<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CENTURIA | Editor</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
  <link href="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.css" rel="stylesheet">
  <script src="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <style>
    :root{--bg:#000103;--cyan:#00f2ff;--dim:rgba(0,242,255,0.15);--panel:rgba(0,1,3,0.97);}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:var(--bg);color:var(--cyan);font-family:'JetBrains Mono',monospace;height:100vh;overflow:hidden;}

    /* ── Connect ── */
    #connect-screen{position:fixed;inset:0;z-index:500;display:flex;align-items:center;justify-content:center;background:var(--bg);}
    .conn-box{width:400px;padding:44px;border:1px solid rgba(0,242,255,.35);background:var(--panel);backdrop-filter:blur(20px);}
    .conn-title{font-size:1.3rem;font-weight:800;letter-spacing:6px;color:#fff;margin-bottom:6px;}
    .conn-sub{font-size:11px;letter-spacing:3px;opacity:.5;margin-bottom:10px;}
    .conn-hint{font-size:11px;opacity:.6;margin-bottom:26px;line-height:1.7;}
    .conn-hint a{color:var(--cyan);}
    #conn-err{margin-top:12px;font-size:11px;color:#ff6060;letter-spacing:1px;display:none;padding:8px;border:1px solid rgba(255,80,80,.3);}

    /* ── Error toast ── */
    #toast{position:fixed;bottom:20px;right:20px;z-index:999;background:rgba(180,30,30,.95);border:1px solid #ff6060;color:#fff;padding:12px 18px;font-size:11px;letter-spacing:1px;display:none;max-width:380px;line-height:1.5;}
    #toast.ok{background:rgba(0,80,40,.95);border-color:#00f2ff;}

    /* ── App ── */
    #app{display:none;height:100vh;}
    .layout{display:flex;height:100vh;}
    #sidebar{width:340px;flex-shrink:0;background:var(--panel);border-right:1px solid var(--dim);display:flex;flex-direction:column;overflow:hidden;}
    #preview-map{flex:1;}

    /* ── Sidebar head ── */
    .sb-head{padding:14px 18px;border-bottom:1px solid var(--dim);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
    .sb-title{font-size:13px;font-weight:800;letter-spacing:4px;color:#fff;}
    .tabs{display:flex;border-bottom:1px solid var(--dim);flex-shrink:0;}
    .tab{flex:1;padding:9px 0;font-size:11px;letter-spacing:2px;text-align:center;cursor:pointer;background:none;border:none;color:var(--cyan);font-family:inherit;border-bottom:2px solid transparent;transition:.2s;font-weight:700;}
    .tab.on{color:#fff;border-bottom-color:var(--cyan);background:rgba(0,242,255,.06);}
    .pane{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--dim) transparent;}

    /* ── Form ── */
    .sec{padding:13px 18px;border-bottom:1px solid var(--dim);}
    .lbl{font-size:10px;letter-spacing:3px;color:rgba(0,242,255,.7);margin-bottom:7px;display:block;font-weight:700;}
    .inp{width:100%;background:rgba(0,242,255,.05);border:1px solid rgba(0,242,255,.25);color:#fff;padding:9px 11px;font-family:inherit;font-size:12px;letter-spacing:.5px;outline:none;transition:border-color .2s;}
    .inp:focus{border-color:var(--cyan);}
    .sel{width:100%;background:#000508;border:1px solid rgba(0,242,255,.25);color:#fff;padding:9px 11px;font-family:inherit;font-size:12px;outline:none;cursor:pointer;}
    .sel option{background:#000508;}

    /* ── Data source tabs ── */
    .src-tabs{display:flex;margin-bottom:10px;}
    .src-tab{flex:1;padding:7px;font-size:10px;letter-spacing:1px;text-align:center;cursor:pointer;background:none;border:1px solid rgba(0,242,255,.2);color:rgba(0,242,255,.7);font-family:inherit;transition:.2s;font-weight:700;}
    .src-tab.on{background:rgba(0,242,255,.12);color:#fff;border-color:var(--cyan);}

    /* ── Drop zone ── */
    .drop{border:1px dashed rgba(0,242,255,.3);padding:20px;text-align:center;cursor:pointer;transition:.2s;position:relative;}
    .drop:hover,.drop.over{border-color:var(--cyan);background:rgba(0,242,255,.05);}
    .drop input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;}
    .drop-icon{font-size:1.5rem;margin-bottom:6px;}
    .drop-text{font-size:11px;letter-spacing:2px;opacity:.65;}
    .drop-name{font-size:12px;color:var(--cyan);font-weight:700;margin-top:5px;}

    /* ── Buttons ── */
    .btn{padding:10px 16px;font-size:11px;letter-spacing:2px;background:none;border:1px solid var(--cyan);color:var(--cyan);cursor:pointer;font-family:inherit;transition:.2s;font-weight:700;}
    .btn:hover{background:var(--cyan);color:#000;}
    .btn.full{width:100%;}
    .btn.sm{padding:6px 10px;font-size:10px;}
    .btn.danger{border-color:rgba(255,80,80,.45);color:rgba(255,110,110,.9);}
    .btn.danger:hover{background:rgba(255,60,60,.18);color:#ff7070;border-color:#ff7070;}
    .row{display:flex;gap:7px;}

    /* ── Layer cards ── */
    .lcard{border:1px solid var(--dim);margin-bottom:8px;background:rgba(0,242,255,.02);}
    .lcard-hd{display:flex;align-items:center;gap:9px;padding:9px 11px;cursor:pointer;user-select:none;}
    .lcard-bd{padding:12px;display:none;border-top:1px solid var(--dim);}
    .lcard-bd.open{display:block;}
    .lnum{font-size:10px;opacity:.4;font-weight:700;}
    .lname-el{font-size:12px;color:#fff;flex:1;font-weight:700;}
    .lcard-arrow{font-size:10px;opacity:.35;}

    /* ── Palette ── */
    .pal-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;}
    .pal-sw{height:26px;border-radius:3px;cursor:pointer;border:2px solid transparent;transition:.15s;}
    .pal-sw.on{border-color:#fff;}

    /* ── Stops editor ── */
    .stops-wrap{display:flex;gap:4px;margin-bottom:6px;}
    .stop-inp{flex:1;min-width:0;background:rgba(0,242,255,.06);border:1px solid rgba(0,242,255,.2);color:#fff;padding:5px 4px;font-family:inherit;font-size:10px;text-align:center;outline:none;-moz-appearance:textfield;}
    .stop-inp::-webkit-outer-spin-button,.stop-inp::-webkit-inner-spin-button{-webkit-appearance:none;}
    .stop-inp:focus{border-color:var(--cyan);}
    .stops-preview{height:6px;border-radius:3px;margin-bottom:4px;}

    /* ── Opacity slider ── */
    .op-sl{width:100%;-webkit-appearance:none;height:2px;outline:none;cursor:pointer;background:linear-gradient(to right,var(--cyan) 0%,var(--cyan) var(--p,60%),rgba(0,242,255,.2) var(--p,60%));}
    .op-sl::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:var(--cyan);}
    .op-row{display:flex;align-items:center;gap:8px;}
    .op-val{font-size:11px;color:#fff;min-width:32px;text-align:right;font-weight:700;}

    /* ── Map list ── */
    .mitem{display:flex;align-items:center;padding:11px 18px;border-bottom:1px solid var(--dim);cursor:pointer;transition:.15s;gap:10px;}
    .mitem:hover{background:rgba(0,242,255,.05);}
    .mitem.cur{background:rgba(0,242,255,.09);}
    .mitem-dot{width:6px;height:6px;border-radius:50%;background:var(--cyan);flex-shrink:0;}
    .mitem-title{font-size:12px;color:#fff;flex:1;font-weight:700;}
    .mitem-slug{font-size:10px;opacity:.45;}
    .empty{padding:30px 18px;text-align:center;font-size:11px;opacity:.4;letter-spacing:2px;}

    /* ── Folder headers ── */
    .folder-hd{display:flex;align-items:center;gap:7px;padding:8px 18px;cursor:pointer;background:rgba(0,242,255,.04);border-bottom:1px solid var(--dim);user-select:none;}
    .folder-hd:hover{background:rgba(0,242,255,.08);}
    .folder-arrow{font-size:9px;opacity:.5;width:10px;flex-shrink:0;}
    .folder-icon{font-size:11px;opacity:.6;}
    .folder-name{font-size:11px;letter-spacing:2px;color:var(--cyan);font-weight:700;flex:1;}
    .folder-count{font-size:10px;opacity:.4;font-weight:700;}
    .folder-body{border-bottom:1px solid var(--dim);}
    .folder-body .mitem{padding-left:30px;}

    /* ── URL box ── */
    .url-box{background:rgba(0,242,255,.06);border:1px solid var(--dim);padding:9px;font-size:10px;color:var(--cyan);word-break:break-all;cursor:pointer;transition:.2s;margin-top:8px;display:none;}
    .url-box:hover{border-color:var(--cyan);}

    /* ── Status bar ── */
    #statusbar{padding:8px 18px;border-top:1px solid var(--dim);font-size:10px;letter-spacing:1px;opacity:.7;display:flex;align-items:center;gap:8px;flex-shrink:0;}
    .sdot{width:6px;height:6px;border-radius:50%;background:var(--cyan);}
    #vp-info{font-size:10px;opacity:.5;letter-spacing:.5px;margin-top:4px;}

    /* ── Checkbox row ── */
    .ck-row{display:flex;align-items:center;gap:8px;cursor:pointer;font-size:11px;color:rgba(255,255,255,.8);font-weight:700;}
    .ck-row input{accent-color:var(--cyan);width:14px;height:14px;cursor:pointer;}
    .field-spacer{height:10px;}
  </style>
</head>
<body>

<!-- ── CONNECT ── -->
<div id="connect-screen">
  <div class="conn-box">
    <div class="conn-title">CENTURIA</div>
    <div class="conn-sub">EDITOR — ACCESO INTERNO</div>
    <label class="lbl">EMAIL</label>
    <input class="inp" id="inp-email" type="email" placeholder="usuario@empresa.com" style="margin-bottom:14px"
      onkeydown="if(event.key==='Enter')document.getElementById('inp-pass').focus()">
    <label class="lbl">CONTRASEÑA</label>
    <input class="inp" id="inp-pass" type="password" placeholder="••••••••" style="margin-bottom:18px"
      onkeydown="if(event.key==='Enter')connect()">
    <button class="btn full" onclick="connect()">ACCEDER</button>
    <div id="conn-err"></div>
    <a href="/" style="display:block;text-align:center;margin-top:16px;font-size:10px;letter-spacing:2px;opacity:.35;color:var(--cyan);text-decoration:none">← INICIO</a>
  </div>
</div>

<!-- ── TOAST ── -->
<div id="toast"></div>

<!-- ── APP ── -->
<div id="app">
  <div class="layout">
    <div id="sidebar">
      <div class="sb-head">
        <a href="/" style="font-size:10px;letter-spacing:2px;opacity:.45;color:var(--cyan);text-decoration:none;flex-shrink:0">← INICIO</a>
        <span class="sb-title" style="flex:1;text-align:center">EDITOR</span>
        <button class="btn sm" onclick="disconnect()">SALIR →</button>
      </div>
      <div class="tabs">
        <button class="tab on" id="t-edit" onclick="gotoTab('edit')">EDITAR</button>
        <button class="tab" id="t-list" onclick="gotoTab('list')">MIS MAPAS</button>
      </div>

      <!-- EDITAR -->
      <div class="pane" id="p-edit">
        <div class="sec">
          <label class="lbl">TÍTULO</label>
          <input class="inp" id="f-title" placeholder="Ej: Densidad Poblacional" oninput="autoSlug()">
        </div>
        <div class="sec">
          <label class="lbl">CARPETA</label>
          <input class="inp" id="f-folder" placeholder="Ej: elecciones / elecciones/2023" list="folder-list" autocomplete="off">
          <datalist id="folder-list"></datalist>
        </div>
        <div class="sec">
          <label class="lbl">DESCRIPCIÓN</label>
          <textarea class="inp" id="f-desc" placeholder="Ej: Densidad de población por radio censal, INDEC 2022" rows="2" style="resize:vertical;line-height:1.5"></textarea>
        </div>
        <div class="sec">
          <label class="lbl">SLUG (URL pública)</label>
          <input class="inp" id="f-slug" placeholder="densidad-poblacional">
          <div class="url-box" id="url-box" onclick="copyUrl()"></div>
        </div>

        <!-- Data source -->
        <div class="sec">
          <label class="lbl">FUENTE DE DATOS</label>
          <div class="src-tabs">
            <button class="src-tab on" id="src-repo" onclick="switchSrc('repo')">REPO /data/</button>
            <button class="src-tab" id="src-upload" onclick="switchSrc('upload')">SUBIR NUEVO</button>
            <button class="src-tab" id="src-url" onclick="switchSrc('url')">URL EXTERNA</button>
          </div>
          <div id="src-repo-pane">
            <div style="display:flex;gap:7px">
              <select class="sel" id="data-sel" style="flex:1"></select>
              <button class="btn sm" onclick="loadFromRepo()">CARGAR</button>
            </div>
          </div>
          <div id="src-upload-pane" style="display:none">
            <div class="drop" id="drop-zone">
              <input type="file" accept=".geojson,.json" onchange="handleFile(this.files[0])">
              <div class="drop-icon">⬡</div>
              <div class="drop-text">DROP GEOJSON / CLICK</div>
              <div class="drop-name" id="drop-name"></div>
            </div>
          </div>
          <div id="src-url-pane" style="display:none">
            <div style="display:flex;gap:7px">
              <input class="inp" id="f-ext-url" placeholder="https://..." style="flex:1">
              <button class="btn sm" onclick="loadExtUrl()">IR</button>
            </div>
          </div>
        </div>

        <!-- Layers -->
        <div class="sec" id="sec-layers" style="display:none">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:11px">
            <label class="lbl" style="margin:0">CAPAS</label>
            <button class="btn sm" onclick="addLayer()">+ CAPA</button>
          </div>
          <div id="layers-list"></div>
        </div>

        <!-- Viewport -->
        <div class="sec" id="sec-vp" style="display:none">
          <label class="lbl">VIEWPORT</label>
          <div style="font-size:10px;opacity:.6;margin-bottom:5px">Navegá el mapa. La vista se guarda al guardar.</div>
          <div id="vp-info"></div>
        </div>

        <!-- Actions -->
        <div class="sec">
          <div class="row" style="margin-bottom:7px">
            <button class="btn full" onclick="saveMap()" style="flex:2">GUARDAR</button>
            <button class="btn" id="btn-ver" onclick="openViewer()" style="display:none;flex:1">VER →</button>
          </div>
          <button class="btn full" onclick="exportHtml()" style="margin-bottom:7px">↓ EXPORTAR HTML STANDALONE</button>
          <button class="btn danger full" id="btn-del" onclick="deleteMap()" style="display:none">ELIMINAR MAPA</button>
        </div>
      </div>

      <!-- MIS MAPAS -->
      <div class="pane" id="p-list" style="display:none">
        <div style="padding:10px 18px;border-bottom:1px solid var(--dim)">
          <button class="btn full sm" onclick="newMap()">+ NUEVO MAPA</button>
        </div>
        <div id="maps-list"><div class="empty">CARGANDO...</div></div>
      </div>

      <div id="statusbar"><div class="sdot"></div><span id="st">LISTO</span></div>
    </div>

    <div id="preview-map"></div>
  </div>
</div>

<script>
// ══ CONFIG ════════════════════════════════════════════════════════════════
const SUPABASE_URL = 'https://vxjghffwcwpdmzmgcsxy.supabase.co';
const SUPABASE_KEY = 'sb_publishable_EeQWniC1tIbys06Cr6Gztg_3Mm-_-OT';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);
// ═════════════════════════════════════════════════════════════════════════

const PALETTES = [
  {n:'Cian',     c:['#24536F','#2F80B3','#009FFF','#5BCDD9','#00F2FF']},
  {n:'Rojo-Amar',c:['#800026','#D01A1C','#FFC44B','#F2D380','#FFFFCC']},
  {n:'Oro',      c:['#4A3315','#AE7431','#E98500','#FFC300','#EFFF05']},
  {n:'Violeta',  c:['#333374','#5151BA','#715AD7','#893CE6','#C571FF']},
  {n:'Rojo',     c:['#3E2428','#5B2931','#760916','#BE1B1C','#EF4648']},
  {n:'Verde',    c:['#16486D','#13769D','#01B797','#7ECC93','#D9ED92']},
  {n:'Gris',     c:['#1a1a1a','#404040','#808080','#b0b0b0','#e0e0e0']},
  {n:'Cian-Mag', c:['#00F2FF','#6699CC','#CC66AA','#EE33CC','#FF00FF']},
];

let previewMap = null;
let geoData = null, geoStoredPath = null, geoNewFile = null;
let numFields = [], mapSlug = null;
let layerSeq = 0;
const layers = [];

// ── INIT ──────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (session) initApp();
  initDrop();
});

// ── AUTH ──────────────────────────────────────────────────────────────────
async function connect() {
  const email = document.getElementById('inp-email').value.trim();
  const pass  = document.getElementById('inp-pass').value;
  const errEl = document.getElementById('conn-err');
  errEl.style.display = 'none';
  if (!email || !pass) return;
  st('VERIFICANDO...');
  const { error } = await sb.auth.signInWithPassword({ email, password: pass });
  if (error) {
    errEl.textContent = '✗ ' + error.message;
    errEl.style.display = 'block';
    st('ERROR');
    return;
  }
  initApp();
}

async function disconnect() {
  await sb.auth.signOut();
  location.reload();
}


// ── APP INIT ──────────────────────────────────────────────────────────────
function initApp() {
  document.getElementById('connect-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  initPreviewMap();
  loadDataFiles();
  loadMapsList();
}

// ── MAP PREVIEW ───────────────────────────────────────────────────────────
function initPreviewMap() {
  previewMap = new maplibregl.Map({
    container: 'preview-map',
    style: 'https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json',
    center: [-58.42,-34.61], zoom:12, bearing:0, pitch:0
  });
  previewMap.addControl(new maplibregl.NavigationControl(), 'top-right');
  previewMap.on('move', () => {
    const c = previewMap.getCenter();
    document.getElementById('vp-info').textContent =
      `lng ${c.lng.toFixed(4)}  lat ${c.lat.toFixed(4)}  zoom ${previewMap.getZoom().toFixed(1)}  bearing ${previewMap.getBearing().toFixed(0)}°  pitch ${previewMap.getPitch().toFixed(0)}°`;
  });
}

function refreshPreview() {
  if (!previewMap || !geoData) return;
  const run = () => {
    layers.forEach(l => { try { if(previewMap.getLayer(l.id)) previewMap.removeLayer(l.id); } catch{} });
    try { if(previewMap.getSource('p')) previewMap.removeSource('p'); } catch{}
    previewMap.addSource('p', { type:'geojson', data: geoData });
    layers.forEach(l => {
      if (!l.field || !l.stops?.length) return;
      const ce = ['interpolate',['linear'],['get',l.field], ...l.stops.flatMap((v,i) => [v, l.colors[i]])];
      const is3d = l.type === 'fill-extrusion';
      previewMap.addLayer({ id:l.id, type:l.type, source:'p',
        paint: is3d ? {
          'fill-extrusion-color':ce, 'fill-extrusion-opacity':l.opacity,
          'fill-extrusion-height':['interpolate',['linear'],['get',l.field],l.stops[0],20,l.stops[4],400],
          'fill-extrusion-base':0
        } : { 'fill-color':ce, 'fill-opacity':l.opacity }
      });
      if (!l.active) previewMap.setLayoutProperty(l.id,'visibility','none');
    });
  };
  if (previewMap.isStyleLoaded()) run();
  else previewMap.once('styledata', () => { if(previewMap.isStyleLoaded()) run(); });
}

// ── DATA FILES ────────────────────────────────────────────────────────────
async function loadDataFiles() {
  const sel = document.getElementById('data-sel');
  try {
    const res = await fetch('/data/index.json');
    const names = await res.json();
    sel.innerHTML = names.length
      ? names.map(n=>`<option value="${n}">${n}</option>`).join('')
      : '<option>No hay archivos en /data/</option>';
  } catch(e) {
    sel.innerHTML = '<option>Error listando /data/</option>';
    showErr('Error listando /data/: ' + e.message);
  }
}

async function loadFromRepo() {
  const name = document.getElementById('data-sel').value;
  if (!name || name.startsWith('No') || name.startsWith('Error')) return;
  st('CARGANDO DATOS...');
  try {
    const res = await fetch('/data/' + name);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    geoData = await res.json();
    geoStoredPath = '/data/' + name;
    geoNewFile = null;
    onGeoLoaded();
  } catch(e) { showErr('Error cargando GeoJSON: ' + e.message); st('ERROR'); }
}

// ── FILE UPLOAD ───────────────────────────────────────────────────────────
function initDrop() {
  const zone = document.getElementById('drop-zone');
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('over'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('over'));
  zone.addEventListener('drop', e => { e.preventDefault(); zone.classList.remove('over'); if(e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]); });
}

async function handleFile(file) {
  if (!file) return;
  st('LEYENDO ARCHIVO...');
  document.getElementById('drop-name').textContent = file.name;
  geoNewFile = file; geoStoredPath = null;
  try { geoData = JSON.parse(await file.text()); onGeoLoaded(); }
  catch { showErr('Archivo inválido: no es un GeoJSON válido.'); st('ERROR'); }
}

async function loadExtUrl() {
  const url = document.getElementById('f-ext-url').value.trim();
  if (!url) return;
  st('CARGANDO URL...');
  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    geoData = await res.json();
    geoStoredPath = url; geoNewFile = null;
    onGeoLoaded();
  } catch(e) { showErr('Error cargando URL: ' + e.message); st('ERROR'); }
}

// ── GEO LOADED ────────────────────────────────────────────────────────────
function onGeoLoaded() {
  numFields = Object.entries(geoData.features?.[0]?.properties || {})
    .filter(([,v]) => typeof v==='number' && !isNaN(v)).map(([k]) => k);
  st(`✓  ${geoData.features?.length || 0} features · ${numFields.length} campos numéricos`);
  document.getElementById('sec-layers').style.display = 'block';
  document.getElementById('sec-vp').style.display = 'block';
  if (layers.length === 0) addLayer();
  else { layers.forEach(l => { if(l.field && (!l.stops||!l.stops.length)) l.stops=calcStops(geoData,l.field); }); renderLayers(); }
  fitToGeo(); refreshPreview();
}

function calcStops(gj, field) {
  const vals = (gj.features||[]).map(f=>f.properties[field]).filter(v=>typeof v==='number'&&!isNaN(v)).sort((a,b)=>a-b);
  if (!vals.length) return [0,25,50,75,100];
  const p = pct => vals[Math.max(0,Math.floor(pct*(vals.length-1)))];
  return [p(0),p(0.25),p(0.5),p(0.75),p(1)].map(v => Math.round(v*100)/100);
}

function fitToGeo() {
  if (!geoData?.features?.length || !previewMap) return;
  let n=-90,s=90,e=-180,w=180;
  const proc=([lng,lat])=>{if(lng<w)w=lng;if(lng>e)e=lng;if(lat<s)s=lat;if(lat>n)n=lat;};
  geoData.features.forEach(f=>{
    const g=f.geometry;
    if(g.type==='Polygon') g.coordinates.forEach(r=>r.forEach(proc));
    else if(g.type==='MultiPolygon') g.coordinates.forEach(p=>p.forEach(r=>r.forEach(proc)));
    else if(g.type==='Point') proc(g.coordinates);
  });
  const go = () => previewMap.fitBounds([[w,s],[e,n]],{padding:40});
  if(previewMap.isStyleLoaded()) go(); else previewMap.once('load',go);
}

// ── LAYERS ────────────────────────────────────────────────────────────────
function addLayer() {
  const id = 'l'+(++layerSeq);
  const field = numFields[0] || '';
  const stops = (geoData && field) ? calcStops(geoData, field) : [0,25,50,75,100];
  layers.push({ id, label:'Capa '+layerSeq, field, type:'fill',
    paletteIdx:0, colors:[...PALETTES[0].c], stops, opacity:0.6, active:true,
    showLegend:true, legendLabel:'' });
  renderLayers();
  if (geoData) refreshPreview();
}

function removeLayer(id) {
  const i = layers.findIndex(l=>l.id===id);
  if(i!==-1) layers.splice(i,1);
  try { if(previewMap.getLayer(id)) previewMap.removeLayer(id); } catch{}
  renderLayers();
}

function updateLayer(id, key, val) {
  const l = layers.find(l=>l.id===id);
  if (!l) return;
  l[key] = val;
  if (key==='paletteIdx') l.colors = [...PALETTES[val].c];
  // Recalculate stops when field changes
  if (key==='field' && geoData) {
    l.stops = calcStops(geoData, val);
    renderLayers();
  }
  if (['field','type','paletteIdx','opacity','active','stops'].includes(key)) refreshPreview();
  if (key==='type'||key==='paletteIdx') renderLayers();
  if (key==='label') { const el=document.querySelector(`#card-${id} .lname-el`); if(el) el.textContent=val; }
}

function updateStop(id, idx, val) {
  const l = layers.find(l=>l.id===id);
  if (!l) return;
  l.stops[idx] = parseFloat(val) || 0;
  // Update gradient preview
  const prev = document.getElementById(`stops-prev-${id}`);
  if (prev) prev.style.background = `linear-gradient(to right,${l.colors.join(',')})`;
  refreshPreview();
}

function recalcStops(id) {
  const l = layers.find(l=>l.id===id);
  if (!l || !geoData) return;
  l.stops = calcStops(geoData, l.field);
  renderLayers();
  refreshPreview();
}

  document.getElementById('layers-list').innerHTML = layers.map((l,i) => `

// ── SAVE / DELETE ─────────────────────────────────────────────────────────
async function saveMap() {
  const title = document.getElementById('f-title').value.trim();
  const slug  = document.getElementById('f-slug').value.trim();
  if (!title || !slug) { showErr('Completá el Título y el Slug antes de guardar.'); return; }
  if (!geoData)        { showErr('Cargá un GeoJSON antes de guardar.'); return; }
  st('GUARDANDO...');
  try {
    // 1. Upload GeoJSON if new local file → Supabase Storage
    let geojsonPath = geoStoredPath;
    if (geoNewFile) {
      const { error: upErr } = await sb.storage.from('geodata').upload(`${slug}.geojson`, geoNewFile, {
        contentType: 'application/geo+json', upsert: true
      });
      if (upErr) throw upErr;
      geojsonPath = sb.storage.from('geodata').getPublicUrl(`${slug}.geojson`).data.publicUrl;
    }

    // 2. Build row
    const c = previewMap.getCenter();
    const description = document.getElementById('f-desc').value.trim();
    const folder = document.getElementById('f-folder').value.trim().replace(/\/+$/, '');
    const row = {
      slug, title, description,
      geojson_url: geojsonPath,
      config: {
        folder,
        center:  [+c.lng.toFixed(5), +c.lat.toFixed(5)],
        zoom:    +previewMap.getZoom().toFixed(3),
        bearing: +previewMap.getBearing().toFixed(1),
        pitch:   +previewMap.getPitch().toFixed(1),
        layers: layers.map(l => ({
          id:l.id, label:l.label, type:l.type, field:l.field,
          colors:l.colors, stops:l.stops, opacity:l.opacity, active:l.active,
          showLegend: l.showLegend !== false,
          legendLabel: l.legendLabel || ''
        }))
      }
    };

    // 3. Upsert to Supabase
    const { error } = await sb.from('maps').upsert(row, { onConflict: 'slug' });
    if (error) throw error;
    mapSlug = slug;

    showOk(`✓ Guardado.\nURL: ${window.location.origin}/v/${slug}`);
    st('GUARDADO ✓');
    showUrl(slug);
    document.getElementById('btn-ver').style.display = '';
    document.getElementById('btn-del').style.display = '';
    loadMapsList();
  } catch(e) {
    showErr(`Error al guardar: ${e.message}`);
    st('ERROR AL GUARDAR');
  }
}

async function deleteMap() {
  if (!mapSlug || !confirm('¿Eliminar este mapa permanentemente?')) return;
  st('ELIMINANDO...');
  try {
    const { error } = await sb.from('maps').delete().eq('slug', mapSlug);
    if (error) throw error;
    newMap(); loadMapsList(); st('ELIMINADO');
  } catch(e) { showErr('Error al eliminar: ' + e.message); }
}

// ── MAP LIST ──────────────────────────────────────────────────────────────
async function loadMapsList() {
  const el = document.getElementById('maps-list');
  el.innerHTML = '<div class="empty">CARGANDO...</div>';
  const { data, error } = await sb.from('maps')
    .select('slug, title, config')
    .order('updated_at', { ascending: false });
  if (error || !data) { el.innerHTML='<div class="empty">NO HAY MAPAS AÚN</div>'; return; }
  if (!data.length)   { el.innerHTML='<div class="empty">NO HAY MAPAS GUARDADOS</div>'; return; }
  const list = data.map(m => ({ slug: m.slug, title: m.title, folder: m.config?.folder || '' }));
  populateFolderList(list);
  el.innerHTML = renderGroupedList(list);
}

function renderGroupedList(list) {
  // Group by folder (empty folder = raíz)
  const groups = {};
  list.forEach(m => {
    const key = m.folder || '';
    if (!groups[key]) groups[key] = [];
    groups[key].push(m);
  });

  const sortedKeys = Object.keys(groups).sort((a,b)=>{
    if (!a) return -1; if (!b) return 1; return a.localeCompare(b);
  });

  return sortedKeys.map(folder => {
    const header = folder
      ? `<div class="folder-hd" onclick="toggleFolder(this)">`
        + `<span class="folder-arrow">▶</span>`
        + `<span class="folder-icon">⌂</span>`
        + `<span class="folder-name">${folder}</span>`
        + `<span class="folder-count">${groups[folder].length}</span>`
        + `</div>`
        + `<div class="folder-body">`
      : '';
    const items = groups[folder].map(m=>`
      <div class="mitem${m.slug===mapSlug?' cur':''}" onclick="loadMapBySlug('${m.slug}')">
        <div class="mitem-dot"></div>
        <div>
          <div class="mitem-title">${m.title}</div>
          <div class="mitem-slug">/v/${m.slug}</div>
        </div>
      </div>`).join('');
    return folder ? header + items + '</div>' : items;
  }).join('');
}

function toggleFolder(hd) {
  const body = hd.nextElementSibling;
  const arrow = hd.querySelector('.folder-arrow');
  const open = body.style.display !== 'none';
  body.style.display = open ? 'none' : 'block';
  arrow.textContent = open ? '▶' : '▼';
}

function populateFolderList(list) {
  const folders = [...new Set(list.map(m=>m.folder).filter(Boolean))].sort();
  const dl = document.getElementById('folder-list');
  if (dl) dl.innerHTML = folders.map(f=>`<option value="${f}">`).join('');
}

async function loadMapBySlug(slug) {
  st('CARGANDO...');
  try {
    const { data: row, error } = await sb.from('maps').select('*').eq('slug', slug).single();
    if (error) throw error;
    // Normalize: merge top-level columns with config JSONB
    const config = { ...row.config, slug: row.slug, title: row.title, description: row.description || '', geojson_url: row.geojson_url };
    mapSlug = slug;

    document.getElementById('f-title').value  = config.title;
    document.getElementById('f-folder').value = config.folder || '';
    document.getElementById('f-desc').value   = config.description;
    document.getElementById('f-slug').value   = config.slug;

    const geoRes = await fetch(config.geojson_url);
    if (!geoRes.ok) throw new Error('No se pudo cargar el GeoJSON del mapa');
    geoData = await geoRes.json();
    geoStoredPath = config.geojson_url; geoNewFile = null;
    numFields = Object.entries(geoData.features?.[0]?.properties||{})
      .filter(([,v])=>typeof v==='number'&&!isNaN(v)).map(([k])=>k);

    layers.length = 0; layerSeq = 0;
    (config.layers||[]).forEach((l,i) => {
      layerSeq = Math.max(layerSeq, i+1);
      layers.push({ id:l.id, label:l.label, type:l.type, field:l.field,
        paletteIdx:0, colors:[...l.colors], stops:[...(l.stops||[])], opacity:l.opacity, active:l.active,
        showLegend: l.showLegend !== false, legendLabel: l.legendLabel||'' });
    });

    document.getElementById('sec-layers').style.display = 'block';
    document.getElementById('sec-vp').style.display = 'block';
    document.getElementById('btn-ver').style.display = '';
    document.getElementById('btn-del').style.display = '';
    renderLayers(); showUrl(slug);
    previewMap.flyTo({ center:config.center, zoom:config.zoom, bearing:config.bearing, pitch:config.pitch, duration:800 });
    previewMap.once('idle', refreshPreview);
    gotoTab('edit'); loadMapsList();
    st('CARGADO: ' + config.title.toUpperCase());
  } catch(e) { showErr('Error al cargar: ' + e.message); st('ERROR'); }
}

// ── UI HELPERS ────────────────────────────────────────────────────────────
function gotoTab(t) {
  document.getElementById('t-edit').classList.toggle('on',t==='edit');
  document.getElementById('t-list').classList.toggle('on',t==='list');
  document.getElementById('p-edit').style.display = t==='edit'?'block':'none';
  document.getElementById('p-list').style.display = t==='list'?'block':'none';
}

function switchSrc(type) {
  ['repo','upload','url'].forEach(t => {
    document.getElementById('src-'+t).classList.toggle('on',t===type);
    document.getElementById('src-'+t+'-pane').style.display = t===type?'block':'none';
  });
}

function newMap() {
  mapSlug=null; geoData=null; geoStoredPath=null; geoNewFile=null; numFields=[]; layers.length=0; layerSeq=0;
  ['f-title','f-folder','f-desc','f-slug','f-ext-url'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('drop-name').textContent='';
  ['url-box','btn-ver','btn-del'].forEach(id=>document.getElementById(id).style.display='none');
  ['sec-layers','sec-vp'].forEach(id=>document.getElementById(id).style.display='none');
  document.getElementById('layers-list').innerHTML='';
  try { layers.forEach(l=>{try{if(previewMap.getLayer(l.id))previewMap.removeLayer(l.id);}catch{}}); if(previewMap.getSource('p'))previewMap.removeSource('p'); } catch{}
  gotoTab('edit'); st('NUEVO MAPA');
}

function autoSlug() {
  document.getElementById('f-slug').value = document.getElementById('f-title').value
    .toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'')
    .replace(/[^a-z0-9\s-]/g,'').replace(/\s+/g,'-').replace(/-+/g,'-').trim();
}

function showUrl(slug) {
  const el = document.getElementById('url-box');
  el.textContent = window.location.origin + '/v/' + slug;
  el.style.display = 'block';
}

function copyUrl() {
  const el = document.getElementById('url-box');
  navigator.clipboard.writeText(el.textContent).then(() => {
    const o=el.textContent; el.textContent='✓ COPIADO'; setTimeout(()=>el.textContent=o,1500);
  });
}

function openViewer() {
  const slug = document.getElementById('f-slug').value.trim();
  if (slug) window.open('/v/'+slug,'_blank');
}

function st(msg) { document.getElementById('st').textContent = msg; }

function showErr(msg) {
  const t = document.getElementById('toast');
  t.className = '';
  t.textContent = '✗ ' + msg;
  t.style.display = 'block';
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.style.display='none', 6000);
}

function showOk(msg) {
  const t = document.getElementById('toast');
  t.className = 'ok';
  t.textContent = msg;
  t.style.display = 'block';
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.style.display='none', 4000);
}


// ── EXPORT STANDALONE HTML ────────────────────────────────────────────────
function exportHtml() {
  if (!geoData || !layers.length) { showErr('Cargá datos y configurá capas antes de exportar.'); return; }
  const title = document.getElementById('f-title').value || 'Mapa';
  const c = previewMap.getCenter();
  const cfg = {
    title,
    center: [+c.lng.toFixed(5), +c.lat.toFixed(5)],
    zoom: +previewMap.getZoom().toFixed(3),
    bearing: +previewMap.getBearing().toFixed(1),
    pitch: +previewMap.getPitch().toFixed(1),
    layers: layers.map(l => ({
      id:l.id, label:l.label, type:l.type, field:l.field,
      colors:l.colors, stops:l.stops||[], opacity:l.opacity, active:l.active,
      showLegend: l.showLegend!==false, legendLabel: l.legendLabel||''
    }))
  };
  const html = generateViewerHtml(geoData, cfg);
  const blob = new Blob([html], { type:'text/html;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = title.toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,'') + '.html';
  a.click();
  URL.revokeObjectURL(a.href);
  showOk('✓ HTML exportado: ' + a.download);
}

<div class="panel" id="panel">
  <div class="ph"><div class="ph-eye">CENTURIA | GEMELO TERRITORIAL</div><div class="ph-title">${cfg.title}</div></div>
  <div class="zctr"><button class="zbtn" id="zo">&#8722;</button><span class="zpct" id="zp">100%</span><button class="zbtn" id="zi">+</button></div>
  <div id="lp"></div>
  <div class="sec"><div class="sec-lbl">MAPA BASE</div><div class="bm-grid">
    <button class="bm-btn on" data-s="dark">OSCURO</button>
    <button class="bm-btn" data-s="voyager">GPS</button>
    <button class="bm-btn" data-s="light">BLANCO</button>
    <button class="bm-btn" data-s="satellite">SAT&#201;LITE</button>
  </div></div>
  <div class="sec" id="ls" style="display:none"><div class="sec-lbl">LEYENDA</div><div id="lc"></div></div>
</div>
<div class="tt" id="tt"></div>
<script>
var GEO=${geoStr};
var CFG=${cfgStr};
var BM={dark:'https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json',voyager:'https://basemaps.cartocdn.com/gl/voyager-gl-style/style.json',light:'https://basemaps.cartocdn.com/gl/positron-gl-style/style.json',satellite:{version:8,sources:{sat:{type:'raster',tiles:['https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'],tileSize:256,attribution:'\\u00a9 Esri'}},layers:[{id:'sat',type:'raster',source:'sat'}]}};
var lc={},ld={},sel=null;
var map=new maplibregl.Map({container:'map',style:BM.dark,center:CFG.center,zoom:CFG.zoom,bearing:CFG.bearing,pitch:CFG.pitch,attributionControl:{compact:true}});
map.on('load',function(){addL();buildP();addTT();addClick();addBM();addZoom();buildLeg();});
function addL(){
  if(!map.getSource('s'))map.addSource('s',{type:'geojson',data:GEO});
  CFG.layers.forEach(function(l){
    var is3=l.type==='fill-extrusion';
    lc[l.id]={opK:is3?'fill-extrusion-opacity':'fill-opacity',colK:is3?'fill-extrusion-color':'fill-color',field:l.field,stops:l.stops,colors:l.colors.slice(),op:l.opacity};
    ld[l.id]={type:l.type,extra:is3?{'fill-extrusion-height':['interpolate',['linear'],['get',l.field],l.stops[0],20,l.stops[l.stops.length-1],400],'fill-extrusion-base':0}:{}};
    var ce=['interpolate',['linear'],['get',l.field]].concat(l.stops.reduce(function(a,v,i){return a.concat([v,l.colors[i]]);},[]));
    var p={};p[lc[l.id].opK]=l.opacity;p[lc[l.id].colK]=ce;Object.assign(p,ld[l.id].extra);
    map.addLayer({id:l.id,type:l.type,source:'s',paint:p,layout:{visibility:l.active?'visible':'none'}});
  });
  map.addLayer({id:'__hf',type:'fill',source:'s',filter:['==',['get','ID_Territorio'],-1],paint:{'fill-color':'#ffffff','fill-opacity':0.18}});
  map.addLayer({id:'__hl',type:'line',source:'s',filter:['==',['get','ID_Territorio'],-1],paint:{'line-color':'#00f2ff','line-width':3,'line-opacity':1}});
}
function rebuildL(){
  ['__hl','__hf'].concat(Object.keys(lc).reverse()).forEach(function(id){try{if(map.getLayer(id))map.removeLayer(id);}catch(e){}});
  try{if(map.getSource('s'))map.removeSource('s');}catch(e){}
  addL();
  document.querySelectorAll('[data-lid] input').forEach(function(cb){var lid=cb.closest('[data-lid]').dataset.lid;if(map.getLayer(lid))map.setLayoutProperty(lid,'visibility',cb.checked?'visible':'none');});
  if(sel!==null){var f=['==',['get','ID_Territorio'],sel];if(map.getLayer('__hf'))map.setFilter('__hf',f);if(map.getLayer('__hl'))map.setFilter('__hl',f);}
}
function visL(){return Object.keys(lc).filter(function(id){try{return map.getLayoutProperty(id,'visibility')==='visible';}catch(e){return false;}});}
function buildP(){
  var html='<div class="sec"><div class="sec-lbl">CAPAS</div>';
  CFG.layers.forEach(function(l){html+='<label class="lrow" data-lid="'+l.id+'"><input type="checkbox"'+(l.active?' checked':'')+' /><span class="sw" style="background:linear-gradient(to right,'+l.colors.join(',')+')" /><span class="ln">'+l.label+'</span></label>';});
  html+='</div>';
  document.getElementById('lp').innerHTML=html;
  document.querySelectorAll('[data-lid] input').forEach(function(cb){cb.addEventListener('change',function(){var lid=cb.closest('[data-lid]').dataset.lid;map.setLayoutProperty(lid,'visibility',cb.checked?'visible':'none');buildLeg();});});
}
function addTT(){
  var tt=document.getElementById('tt');
  map.on('mousemove',function(e){
    var hits=map.queryRenderedFeatures(e.point,{layers:visL()});
    if(!hits.length){tt.style.display='none';map.getCanvas().style.cursor='';return;}
    var p=hits[0].properties,rows='';
    Object.entries(p).filter(function(kv){return kv[1]!==null&&kv[1]!==undefined&&kv[1]!=='';}).slice(0,8).forEach(function(kv){rows+='<div class="tt-r"><span class="tt-k">'+kv[0]+'</span><span class="tt-v">'+(typeof kv[1]==='number'?kv[1].toLocaleString('es-AR'):kv[1])+'</span></div>';});
    tt.style.display='block';tt.style.left=(e.originalEvent.clientX+14)+'px';tt.style.top=(e.originalEvent.clientY-10)+'px';
    tt.innerHTML='<div class="tt-t">RADIO '+(p.ID_Territorio||p.id||'')+'</div>'+rows;
    map.getCanvas().style.cursor='pointer';
  });
  map.on('mouseout',function(){tt.style.display='none';map.getCanvas().style.cursor='';});
}
function addClick(){
  map.on('click',function(e){
    var hits=map.queryRenderedFeatures(e.point,{layers:visL()});
    if(!hits.length){sel=null;clrH();return;}
    var f=hits[0],idf='ID_Territorio' in f.properties?'ID_Territorio':'id',id=f.properties[idf]||null;
    if(id===sel){sel=null;clrH();return;}
    sel=id;var ft=['==',['get',idf],id];
    if(map.getLayer('__hf'))map.setFilter('__hf',ft);if(map.getLayer('__hl'))map.setFilter('__hl',ft);
    var n=-90,s=90,ex=-180,w=180,g=f.geometry;
    function pr(c){if(c[0]<w)w=c[0];if(c[0]>ex)ex=c[0];if(c[1]<s)s=c[1];if(c[1]>n)n=c[1];}
    if(g.type==='Polygon')g.coordinates.forEach(function(r){r.forEach(pr);});
    if(g.type==='MultiPolygon')g.coordinates.forEach(function(p2){p2.forEach(function(r){r.forEach(pr);});});
    map.fitBounds([[w,s],[ex,n]],{padding:100,duration:900,maxZoom:17,pitch:map.getPitch(),bearing:map.getBearing()});
  });
}
function clrH(){var f=['==',['get','ID_Territorio'],-1];if(map.getLayer('__hf'))map.setFilter('__hf',f);if(map.getLayer('__hl'))map.setFilter('__hl',f);}
function buildLeg(){
  var vl=CFG.layers.filter(function(l){if(l.showLegend===false)return false;try{return map.getLayoutProperty(l.id,'visibility')==='visible';}catch(e){return l.active;}});
  var ls=document.getElementById('ls'),lct=document.getElementById('lc');
  if(!vl.length){ls.style.display='none';return;}
  ls.style.display='block';
  function fv(v){if(typeof v!=='number')return String(v);return Math.abs(v)>=1000?Math.round(v).toLocaleString('es-AR'):v%1===0?String(v):v.toFixed(1);}
  lct.innerHTML=vl.map(function(l){var lbl=l.legendLabel||l.label,s=l.stops||[];return '<div class="li"><div class="ll">'+lbl+'</div><div class="lb" style="background:linear-gradient(to right,'+l.colors.join(',')+')" /><div class="lv"><span>'+fv(s[0])+'</span><span>'+fv(s[Math.floor(s.length/2)])+'</span><span>'+fv(s[s.length-1])+'</span></div></div>';}).join('');
}
function addBM(){
  document.querySelectorAll('.bm-btn').forEach(function(btn){
    btn.addEventListener('click',function(){
      if(btn.classList.contains('on'))return;
      document.querySelectorAll('.bm-btn').forEach(function(b){b.classList.remove('on');});
      btn.classList.add('on');
      ['__hl','__hf'].concat(Object.keys(lc).reverse()).forEach(function(id){try{if(map.getLayer(id))map.removeLayer(id);}catch(e){}});
      try{if(map.getSource('s'))map.removeSource('s');}catch(e){}
      map.setStyle(BM[btn.dataset.s]);
      var onR=function(){if(!map.isStyleLoaded())return;map.off('styledata',onR);rebuildL();};
      map.on('styledata',onR);
    });
  });
}
function addZoom(){
  var panel=document.getElementById('panel'),pct=document.getElementById('zp'),STEP=0.1,MIN=0.6,MAX=1.6;
  var scale=parseFloat(localStorage.getItem('cv-scale')||'1');
  function apply(){panel.style.transform=scale===1?'':('scale('+scale+')');pct.textContent=Math.round(scale*100)+'%';localStorage.setItem('cv-scale',scale);}
  apply();
  document.getElementById('zi').onclick=function(){scale=Math.min(MAX,parseFloat((scale+STEP).toFixed(1)));apply();};
  document.getElementById('zo').onclick=function(){scale=Math.max(MIN,parseFloat((scale-STEP).toFixed(1)));apply();};
}
<\/script>
</body></html>`;
}
</script>
</body>
</html>
